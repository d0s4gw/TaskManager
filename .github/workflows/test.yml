name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Install Server Dependencies
      run: cd server && npm ci
      
    - name: Run Server Tests
      run: cd server && npm test
      
    - name: Install Web Dependencies
      run: cd web && npm ci
      
    - name: Run Web Tests
      run: cd web && npm test
