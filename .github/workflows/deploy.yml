name: Deploy TaskManager

on:
  push:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: 'task-manager-staging-494203'
      REGION: 'us-central1'
    steps:
    - uses: actions/checkout@v4
    
    - name: 'Set up Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/1279412370/locations/global/workloadIdentityPools/github-pool/providers/github-deploy-provider'
        service_account: 'github-deployer@task-manager-staging-494203.iam.gserviceaccount.com'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3

    - name: 'Terraform Plan & Apply'
      run: |
        cd terraform
        terraform init
        terraform workspace select staging || terraform workspace new staging
        terraform apply -var-file=environments/staging.tfvars -auto-approve

    - name: 'Build and Deploy Server'
      run: |
        gcloud builds submit . --config cloudbuild.yaml
        gcloud run deploy task-manager-server \
          --image gcr.io/$PROJECT_ID/server \
          --platform managed \
          --region $REGION \
          --service-account task-manager-server@$PROJECT_ID.iam.gserviceaccount.com

    - name: 'Deploy Web to Firebase'
      run: |
        cd web
        npm ci
        npm run build
        cd ..
        npx firebase-tools deploy --only hosting --project $PROJECT_ID --debug
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
