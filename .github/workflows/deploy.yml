name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Server Dependencies
      run: cd server && npm ci

    - name: Run Server Lint
      run: cd server && npm run lint

    - name: Run Server Audit
      run: cd server && npm audit --audit-level=high

    - name: Run Server Tests
      run: cd server && npm test

  test-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Web Dependencies
      run: cd web && npm ci

    - name: Run Web Lint
      run: cd web && npm run lint

    - name: Run Web Audit
      run: cd web && npm audit --audit-level=high

    - name: Run Web Tests
      run: cd web && npm test

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-server, test-web]
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Web Dependencies
      run: cd web && npm ci

    - name: Install Playwright Browsers
      run: cd web && npx playwright install --with-deps chromium

    - name: Run E2E Tests
      run: cd web && npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: web/playwright-report/
        retention-days: 14

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Format Check
      run: terraform -chdir=terraform fmt -check -recursive -diff

    - name: Terraform Init (backend=false)
      run: terraform -chdir=terraform init -backend=false

    - name: Terraform Validate
      run: terraform -chdir=terraform validate

  deploy-staging:
    name: Deploy to Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-server, test-web, test-e2e, validate-terraform]
    runs-on: ubuntu-latest
    environment: staging
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_STAGING }}
      REGION: 'us-central1'
    steps:
    - uses: actions/checkout@v4
    
    - name: 'Set up Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT_STAGING }}

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3

    - name: 'Terraform Plan & Apply'
      run: |
        cd terraform
        terraform init
        terraform workspace select staging || terraform workspace new staging
        terraform apply -var-file=environments/staging.tfvars \
          -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}" \
          -var="alert_email=${{ vars.ALERT_EMAIL }}" \
          -auto-approve

    - name: 'Build and Deploy Server'
      run: |
        gcloud builds submit . --config cloudbuild.yaml
        gcloud run deploy task-manager-server \
          --image gcr.io/$PROJECT_ID/server \
          --platform managed \
          --region $REGION \
          --service-account task-manager-server@$PROJECT_ID.iam.gserviceaccount.com \
          --ingress internal-and-cloud-load-balancing

    - name: 'Deploy Web to Firebase'
      run: |
        cd web
        npm ci
        npm run build
        cd ..
        npx firebase-tools deploy --only hosting,firestore --project $PROJECT_ID
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_STAGING }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_STAGING }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

  deploy-prod:
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch' # Manual trigger only for now
    needs: [test-server, test-web, test-e2e, validate-terraform]
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_PROD }}
      REGION: 'us-central1'
    steps:
    - uses: actions/checkout@v4
    
    - name: 'Set up Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT_PROD }}

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3

    - name: 'Terraform Plan & Apply'
      run: |
        cd terraform
        terraform init
        terraform workspace select prod || terraform workspace new prod
        terraform apply -var-file=environments/prod.tfvars \
          -var="billing_account=${{ secrets.GCP_BILLING_ACCOUNT }}" \
          -var="alert_email=${{ vars.ALERT_EMAIL }}" \
          -auto-approve

    - name: 'Build and Deploy Server'
      run: |
        gcloud builds submit . --config cloudbuild.yaml
        gcloud run deploy task-manager-server \
          --image gcr.io/$PROJECT_ID/server \
          --platform managed \
          --region $REGION \
          --service-account task-manager-server@$PROJECT_ID.iam.gserviceaccount.com \
          --ingress internal-and-cloud-load-balancing

    - name: 'Deploy Web to Firebase'
      run: |
        cd web
        npm ci
        npm run build
        cd ..
        npx firebase-tools deploy --only hosting,firestore --project $PROJECT_ID
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_PROD }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN_PROD }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_PROD }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET_PROD }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID_PROD }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_PROD }}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY_PROD }}

