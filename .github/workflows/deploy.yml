name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Server Dependencies
      run: cd server && npm ci

    - name: Run Server Tests
      run: cd server && npm test

  test-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Web Dependencies
      run: cd web && npm ci

    - name: Run Web Tests
      run: cd web && npm test

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-server, test-web]
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Web Dependencies
      run: cd web && npm ci

    - name: Install Playwright Browsers
      run: cd web && npx playwright install --with-deps chromium

    - name: Run E2E Tests
      run: cd web && npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: web/playwright-report/
        retention-days: 14

  validate-terraform:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Format Check
      run: terraform -chdir=terraform fmt -check -recursive -diff

    - name: Terraform Init (backend=false)
      run: terraform -chdir=terraform init -backend=false

    - name: Terraform Validate
      run: terraform -chdir=terraform validate

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-server, test-web, test-e2e, validate-terraform]
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: 'task-manager-staging-494203'
      REGION: 'us-central1'
    steps:
    - uses: actions/checkout@v4
    
    - name: 'Set up Node.js'
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/1279412370/locations/global/workloadIdentityPools/github-pool/providers/github-deploy-provider'
        service_account: 'github-deployer@task-manager-staging-494203.iam.gserviceaccount.com'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3

    - name: 'Terraform Plan & Apply'
      run: |
        cd terraform
        terraform init
        terraform workspace select staging || terraform workspace new staging
        terraform apply -var-file=environments/staging.tfvars -auto-approve

    - name: 'Build and Deploy Server'
      run: |
        gcloud builds submit . --config cloudbuild.yaml
        gcloud run deploy task-manager-server \
          --image gcr.io/$PROJECT_ID/server \
          --platform managed \
          --region $REGION \
          --service-account task-manager-server@$PROJECT_ID.iam.gserviceaccount.com \
          --allow-unauthenticated

    - name: 'Deploy Web to Firebase'
      run: |
        cd web
        npm ci
        npm run build
        cd ..
        npx firebase-tools deploy --only hosting --project $PROJECT_ID --debug
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
